name: "Kura Curator"
description: "Mori keeps your docs true to your code — on a PR, opens a docs PR updating only the pages the change affects."
author: "Lawrence Lin"
branding:
  icon: "book-open"
  color: "purple"

inputs:
  anthropic-api-key:
    description: "Anthropic API key for the default claude-agent-sdk backend. Pass a repo secret."
    required: false
  docs-dir:
    description: "Directory holding the Markdown docs (Kura default: content/docs)."
    required: false
    default: "content/docs"
  backend:
    description: "Agent backend: 'claude-agent-sdk' (default) or 'cli'."
    required: false
    default: "claude-agent-sdk"
  model:
    description: "Model id for the claude-agent-sdk backend (optional)."
    required: false
    default: ""
  agent-cmd:
    description: "For backend=cli: the external agent CLI command (e.g. 'codex exec')."
    required: false
    default: ""
  mode:
    description: "How to deliver the docs update: 'new-pr' (default — a standalone, docs-only PR; works with forks and post-merge push triggers) or 'same-pr' (commit onto the triggering PR's branch; same-repo PRs only, falls back to new-pr on forks)."
    required: false
    default: "new-pr"
  base:
    description: "Base branch the docs PR targets / diffs against. Defaults to the PR base / 'main'."
    required: false
    default: ""
  docs-repo:
    description: "Cross-repo mode: 'owner/name' of a SEPARATE repo holding the docs. Empty = same-repo (docs live beside the code). Requires a github-token with write access to that repo."
    required: false
    default: ""
  docs-ref:
    description: "Base branch in the docs repo to open the PR against (cross-repo mode). Default 'main'."
    required: false
    default: "main"
  github-token:
    description: "Token used to push the branch and open the PR."
    required: false
    default: ${{ github.token }}
  commit-message:
    description: "Commit subject (also used as the PR title). Default: 'docs: sync with <first changed file>'."
    required: false
    default: ""
  commit-trailer:
    description: "Appended to the commit as a body line. Default 'via @kurabuild'; set to an empty string to omit it."
    required: false
    default: "via @kurabuild"
  committer-name:
    description: "Git author/committer name for the docs commit. For a real commit avatar, use a GitHub identity — e.g. a GitHub App bot 'mori[bot]' or a machine user."
    required: false
    default: "Mori"
  committer-email:
    description: "Git author/committer email. GitHub shows an avatar only if this matches a GitHub account — e.g. a GitHub App bot '<bot-user-id>+mori[bot]@users.noreply.github.com'. The default mori@kura.build has no account, so it renders the generic placeholder."
    required: false
    default: "mori@kura.build"

outputs:
  pr-url:
    description: "URL of the opened docs PR, if any."
    value: ${{ steps.run.outputs.pr-url }}

# Composite (not a bundled node action): the Claude Agent SDK spawns a per-platform native CLI that
# lives in optional packages (@anthropic-ai/claude-agent-sdk-<platform>). Installing on the runner
# itself pulls the correct binary; a pre-bundled dist can't carry it. Deps install from the action's
# own lockfile, then we run the compiled script against the consumer's checkout.
runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@v5
      with:
        node-version: "24"
    - name: Install Curator
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --omit=dev
    - name: Run Curator
      id: run
      shell: bash
      run: node "$GITHUB_ACTION_PATH/dist/main.js"
      env:
        CURATOR_ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        CURATOR_DOCS_DIR: ${{ inputs.docs-dir }}
        CURATOR_BACKEND: ${{ inputs.backend }}
        CURATOR_MODE: ${{ inputs.mode }}
        CURATOR_MODEL: ${{ inputs.model }}
        CURATOR_AGENT_CMD: ${{ inputs.agent-cmd }}
        CURATOR_BASE: ${{ inputs.base }}
        CURATOR_DOCS_REPO: ${{ inputs.docs-repo }}
        CURATOR_DOCS_REF: ${{ inputs.docs-ref }}
        CURATOR_GITHUB_TOKEN: ${{ inputs.github-token }}
        CURATOR_COMMIT_MESSAGE: ${{ inputs.commit-message }}
        CURATOR_COMMIT_TRAILER: ${{ inputs.commit-trailer }}
        CURATOR_COMMITTER_NAME: ${{ inputs.committer-name }}
        CURATOR_COMMITTER_EMAIL: ${{ inputs.committer-email }}
